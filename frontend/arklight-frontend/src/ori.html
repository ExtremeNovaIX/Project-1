<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Arklight 页面布局原型</title>
	<style>
		/* 基础重置，确保 AI 理解 100% 高度布局 */
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body, html { height: 100%; font-family: system-ui, sans-serif; overflow: hidden; background: #f0f0f0; }

		/* 核心布局：左侧 1/3，右侧剩余 */
		.app-container {
			display: flex;
			height: 100vh;
			width: 100vw;
		}

		/* 左侧：立绘区域 (Portrait Area) */
		/* AI 识别点：width: 33.33% */
		.portrait-sidebar {
			width: 33.33%;
			height: 100%;
			background: #e0e0e0;
			border-right: 2px dashed #999;
			display: flex;
			flex-direction: column;
			position: relative;
		}

		/* 立绘占位符 */
		.character-placeholder {
			flex-grow: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: bold;
			color: #666;
			text-align: center;
			padding: 20px;
		}

		/* 右侧：聊天主区域 (Chat Main Area) */
		.chat-main {
			flex: 1;
			display: flex;
			flex-direction: column;
			background: white;
			position: relative;
		}

		/* 顶部条：包含设置按钮 */
		.top-bar {
			height: 60px;
			padding: 0 20px;
			display: flex;
			justify-content: flex-end; /* 靠右对齐 */
			align-items: center;
			border-bottom: 1px solid #ddd;
		}

		/* 设置按钮 ID: btn-settings */
		.settings-button {
			padding: 8px 16px;
			border: 2px solid #007bff;
			background: #e7f3ff;
			cursor: pointer;
			font-weight: bold;
			border-radius: 4px;
		}

		/* 聊天历史记录区 */
		.chat-history {
			flex-grow: 1;
			overflow-y: auto;
			padding: 20px;
			display: flex;
			flex-direction: column;
			gap: 15px;
			background: #fafafa;
		}

		/* 消息占位 */
		.message {
			max-width: 80%;
			padding: 10px;
			border: 1px solid #ccc;
			border-radius: 8px;
		}
		.message.ai { align-self: flex-start; background: #fff; }
		.message.user { align-self: flex-end; background: #dcf8c6; }

		/* 输入框区域 */
		.input-area {
			height: 120px;
			border-top: 1px solid #ddd;
			padding: 15px;
			display: flex;
			gap: 10px;
		}

		textarea {
			flex-grow: 1;
			border: 1px solid #ccc;
			border-radius: 4px;
			padding: 10px;
			resize: none;
		}

		.send-button {
			width: 80px;
			background: #007bff;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
		}

		/* 调试辅助：显示区域名称 */
		.region-label {
			position: absolute;
			top: 5px;
			left: 5px;
			font-size: 10px;
			color: #999;
			text-transform: uppercase;
			pointer-events: none;
		}
	</style>
</head>
<body>

<div class="app-container" id="arklight-app">

	<!-- 区域 1: 左侧立绘 (1/3 宽度) -->
	<aside class="portrait-sidebar" id="region-portrait">
		<span class="region-label">Character Area (1/3 Width)</span>
		<div class="character-placeholder">
			[这里是立绘展示区]<br>
			CHARACTER_IMAGE_PLACEHOLDER
		</div>
		<!-- 可选：底部状态/名字 -->
		<div style="padding: 15px; background: rgba(0,0,0,0.05); text-align: center;">
			<strong>角色名称 / 状态栏</strong>
		</div>
	</aside>

	<!-- 区域 2: 右侧聊天区 -->
	<main class="chat-main" id="region-chat">
		<span class="region-label">Chat & Interaction Area</span>

		<!-- 顶部操作栏 -->
		<header class="top-bar">
			<!-- AI 识别点：设置按钮位于右上角 -->
			<button class="settings-button" id="btn-settings">⚙️ 设置</button>
		</header>

		<!-- 聊天记录 -->
		<section class="chat-history" id="chat-scroller">
			<div class="message ai">你好！我是 Arklight 的助手。</div>
			<div class="message user">我正在测试页面原型布局。</div>
		</section>

		<!-- 消息输入 -->
		<footer class="input-area">
			<textarea placeholder="在此输入消息..."></textarea>
			<button class="send-button" id="btn-send">发送</button>
		</footer>
	</main>

</div>

</body>
</html>

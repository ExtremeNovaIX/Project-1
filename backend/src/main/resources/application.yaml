spring:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  datasource:
    url: jdbc:h2:file:./data/assistant_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

assistant:
  mode: local

  api:
    chat-model:
      api-key: ${DEEPSEEK_API_KEY:default_value}
      base-url: https://api.deepseek.com
      model-name: deepseek-chat
      timeout-seconds: 60
      log-enabled: false
    embedding-model:
      api-key: ${DASHSCOPE_API_KEY:default_value}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v3

  local:
    chat-model:
      base-url: http://127.0.0.1:1234/v1
      model-name: gemma-4-e4b-rp
      timeout-seconds: 120
      log-enabled: false
    embedding-model:
      base-url: http://127.0.0.1:1234/v1
      model-name: text-embedding-embedding

  chat-memory:
    max-messages: 80
    trigger-compress-threshold: 20
    compress-count: 14
    duplication-threshold: 0.93
    related-threshold: 0.5
    context-max-summary-count: 3
    patch-merge-threshold: 3
    patch-merge-max-count: 3
    patch-merge-scan-fixed-delay-ms: 1800000

  lock:
    session-lock-wait-timeout-ms: 10000
    session-lock-retry-count: 3
    session-lock-retry-delay-ms: 100
    compression-lease-timeout-ms: 300000

  embedding-store:
    path: data/vector_indices

  md-repository:
    path: data/memory

  markdown-migration:
    enabled: false
    vault-path: data/memory
    overwrite-existing: false

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

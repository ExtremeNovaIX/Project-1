mcp:
  catalog:
    STS2MCP:
      display-name: "杀戮尖塔2"
      description: "杀戮尖塔2 MCP Mod。需要先安装 STS2_MCP.dll 到游戏 mods 目录，并确保 uv 已安装。"
      transport: stdio
      adapter: sts2
      state-tool-name: get_game_state
      state-settle-max-attempts: 4
      state-settle-delay-ms: 250
      command: "uv"
      args: ["run", "--directory", "{{installPath}}", "python", "server.py"]
      connect-timeout-seconds: 30
      gameplay-guidelines:
        - 战斗中仔细评估手牌、能量、防御需求和敌人意图。
        - 地图选择时权衡火堆、商店、精英和普通战斗的风险收益。
        - 优先移除低价值卡牌，保持牌组精简。
        - 平衡攻击、防御和成长能力，避免只追求短期输出。
        - 商店优先考虑关键遗物和删牌，其次补充高价值卡牌。
        - 每回合评估剩余能量和手牌；能产生有效收益就继续行动，否则结束回合。
        - 不需要特定按照从右到左的顺序行动，即使因为打牌导致index变化，在手牌中存在相同牌的情况下后台也会自动匹配并修正id。
        - 最好把可能引起手牌异常变化的操作（如带有抽牌、弃牌等效果的卡牌或药水）放在每次操作队列的最后。后台会因为手牌异常变化（如打出后空翻：5点格挡抽两张牌，此时手牌数量为x-1+2，与预测的x-1不同）清空操作队列并且要求你重新计划。
        - 有些时候不是所有卡都必拿，卡组越大转速越慢，你需要控制卡组大小，必要时可以跳过一些垃圾卡牌奖励。

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI Chat Pro</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  height: 100vh;
  display: flex;
}

/* 左侧栏 */
.sidebar {
  width: 260px;
  background: #111827;
  color: white;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 15px;
  border-bottom: 1px solid #333;
}

.new-chat {
  width: 100%;
  padding: 10px;
  margin-left:-3px;
  background: #4f46e5;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.chat-list {
  flex: 1;
  overflow-y: auto;
}

.chat-item {
  padding: 12px;
  cursor: pointer;
}

.chat-item:hover {
  background: #1f2937;
}

.active {
  background: #374151;
}

/* 右侧聊天区 */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #f9fafb;
}

.header {
  padding: 15px;
  background: white;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.msg {
  margin-bottom: 12px;
  display: flex;
}

.user { justify-content: flex-end; }
.ai { justify-content: flex-start; }

.bubble {
  padding: 10px 14px;
  border-radius: 12px;
  max-width: 60%;
}

.user .bubble {
  background: #4f46e5;
  color: white;
}

.ai .bubble {
  background: #e5e7eb;
}

.input-area {
  display: flex;
  padding: 10px;
  background: white;
  border-top: 1px solid #ddd;
}

textarea {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  resize: none;
}

button {
  margin-left: 10px;
  padding: 10px 16px;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 左侧 -->
<div class="sidebar">
  <div class="sidebar-header">
    <button class="new-chat" onclick="newChat()">➕ 新建聊天</button>
  </div>
  <div class="chat-list" id="chatList"></div>
</div>

<!-- 右侧 -->
<div class="main">
  <div class="header" id="title">聊天</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" placeholder="输入消息..." onkeydown="handleKey(event)"></textarea>
    <button onclick="send()">发送</button>
  </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats") || "{}");
let currentChat = localStorage.getItem("currentChat");
let chatCount = parseInt(localStorage.getItem("chatCount") || "1");
// 新建聊天
function newChat() {
  const id = "chat-" + Date.now();
  chats[id] = [];
  currentChat = id;

  const item = document.createElement("div");
item.className = "chat-item active";

const title = document.createElement("span");
title.innerText = "聊天 " + chatCount++;

const del = document.createElement("span");
del.innerText = "🗑️";
del.style.float = "right";
del.style.cursor = "pointer";

del.onclick = (e) => {
  e.stopPropagation(); // ❗️防止触发切换
  deleteChat(id, item);
};

item.appendChild(title);
item.appendChild(del);

item.onclick = () => switchChat(id, item);

  item.onclick = () => switchChat(id, item);

  document.getElementById("chatList").appendChild(item);

  updateActive();
  renderMessages();
  saveChats();
}
//保存聊天
function saveChats() {
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("currentChat", currentChat);
  localStorage.setItem("chatCount", chatCount);
}
//删除聊天
function deleteChat(id, el) {
  // 删除数据
  delete chats[id];

  // 删除UI
  el.remove();

  // 如果删的是当前聊天
  if (currentChat === id) {
    const keys = Object.keys(chats);

    if (keys.length > 0) {
      currentChat = keys[0];
      renderMessages();
    } else {
      currentChat = null;
      document.getElementById("messages").innerHTML = "";
    }
  }

  saveChats();
}
// 切换聊天
function switchChat(id, el) {
  currentChat = id;
  updateActive(el);
  renderMessages();
  saveChats();
}

// 更新选中样式
function updateActive(activeEl) {
  document.querySelectorAll(".chat-item").forEach(i => i.classList.remove("active"));
  if (activeEl) activeEl.classList.add("active");
}

// 渲染消息
function renderMessages() {
  const box = document.getElementById("messages");
  box.innerHTML = "";

  (chats[currentChat] || []).forEach(m => {
    addMessage(m.text, m.type, false);
  });
}

// 添加消息
function addMessage(text, type, save = true) {
  const div = document.createElement("div");
  div.className = "msg " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  div.appendChild(bubble);
  document.getElementById("messages").appendChild(div);

  if (save) {
    chats[currentChat].push({ text, type });
  }

  const box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;
}

// 回车发送
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

// 发送消息
function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || !currentChat) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("思考中...", "ai");

  fetch("http://localhost:8080/api/chat/send", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: text,
      sessionId: currentChat
    })
  })
  .then(res => res.json())
  .then(data => {
    chats[currentChat].pop(); // 删除思考中
    renderMessages();
    addMessage(data.reply || "无回复", "ai");
    saveChats();
  })
  .catch(() => {
    chats[currentChat].pop();
    renderMessages();
    addMessage("请求失败", "ai");
  });
}

// 默认创建一个聊天
function loadChats() {
  const list = document.getElementById("chatList");

  Object.keys(chats).forEach((id, index) => {
    const item = document.createElement("div");
    item.className = "chat-item";

    const title = document.createElement("span");
    title.innerText = "聊天 " + (index + 1);

    const del = document.createElement("span");
    del.innerText = "🗑️";
    del.style.float = "right";
    del.style.cursor = "pointer";

    del.onclick = (e) => {
      e.stopPropagation();
      deleteChat(id, item);
    };

    item.appendChild(title);
    item.appendChild(del);

    item.onclick = () => switchChat(id, item);

    item.onclick = () => switchChat(id, item);

    if (id === currentChat) {
      item.classList.add("active");
    }

    list.appendChild(item);
  });

  if (currentChat) {
    renderMessages();
  } else {
    newChat();
  }
}

loadChats();
</script>

</body>
</html>

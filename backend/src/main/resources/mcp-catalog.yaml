mcp:
  catalog:
    STS2MCP:
      display-name: "杀戮尖塔2"
      description: "杀戮尖塔2 MCP Mod。需要先安装 STS2_MCP.dll 到游戏 mods 目录，并确保 uv 已安装。"
      transport: stdio
      adapter: sts2
      state-tool-name: get_game_state
      state-settle-max-attempts: 4
      state-settle-delay-ms: 250
      command: "uv"
      args: ["run", "--directory", "{{installPath}}", "python", "server.py"]
      connect-timeout-seconds: 30
      gameplay-guidelines:
        - 战斗中快速评估能量、防御需求、是否能斩杀；明显高收益路径可直接执行，不要穷举所有组合。
        - 地图选择时权衡火堆、商店、精英和普通战斗的风险收益。
        - 平衡攻击、防御和成长能力，避免只追求短期输出。
        - 商店优先考虑关键遗物和补充高价值卡牌，其次考虑删牌。
        - 每回合评估剩余能量和手牌；能产生有效收益就继续行动，否则结束回合。
        - 抽牌、弃牌、随机、领取奖励、打开选择界面等会改变行动窗口的操作必须放在本批队列末尾；触发状态变化后后台会中断剩余队列并要求重新计划。
        - 有些时候不是所有卡都必拿，卡组越大转速越慢，你需要控制卡组大小，必要时可以跳过一些对当前构筑没用的卡牌奖励。

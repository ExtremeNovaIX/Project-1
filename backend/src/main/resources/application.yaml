spring:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  datasource:
    url: jdbc:h2:file:./data/assistant_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

assistant:
  chat-model:
    api-key: ${DEEPSEEK_API_KEY:default_value}
    base-url: https://api.deepseek.com
    model-name: deepseek-chat
    timeout-seconds: 60
    log-enabled: false

  chat-memory:
    max-messages: 80
    trigger-threshold: 30
    compress-count: 20
    context-max-summary-count: 3

  embedding-model:
    api-key: ${DASHSCOPE_API_KEY:default_value}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model-name: text-embedding-v3

  embedding-store:
    path: data/vector_indices

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

mcp:
  servers-directory: ${MCP_SERVERS_DIR:../mcp-servers}
  registry-file: ${MCP_REGISTRY_FILE:config/mcp-registry.json}
  client:
    tool-timeout-seconds: 120
    max-connections: 4

gamer:
  default-game-name: ${GAMER_DEFAULT_GAME:}
  default-session-id: ${GAMER_DEFAULT_SESSION:default}
  client-name: ${GAMER_MCP_CLIENT_NAME:ArcLight-GameAgent}
  client-version: ${GAMER_MCP_CLIENT_VERSION:1.0}
  game-loop:
    poll-interval-ms: 500
    max-immediate-replans: 5
  streaming:
    enabled: true
    max-actions-per-stream: 12
    max-stream-wait-ms: 30000
    first-action-timeout-ms: 12000
    max-json-candidate-chars: 12000
    reasoning-trace-max-chars: 4000
    parse-thinking-chunks: false
    parse-response-chunks: true
    log-stream-summary: true
    log-summary-max-chars: 6000
  memory:
    recent-decision-limit: 20
    stage-compress-decision-interval: 16
    run-compress-stage-interval: 10
    trace-enabled: true
    trace-directory: data/gamer-traces
